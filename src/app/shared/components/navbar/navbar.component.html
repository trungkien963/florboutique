<!-- ===== Flơr Navbar ===== -->
<header class="flr-header">

  <!-- Top promo bar -->
  <div class="promo-bar">
    <span>{{ lang.t.promoBar }}</span>
  </div>

  <!-- Main nav -->
  <nav class="main-nav">

    <!-- Hamburger (mobile) -->
    <button class="hamburger" id="mobile-menu-btn" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <!-- Left links -->
    <ul class="nav-links" [class.nav-open]="menuOpen">
      <li><a [routerLink]="['/']" fragment="products" class="nav-link">{{ lang.t.navBouquets }}</a></li>
      <li><a [routerLink]="['/']" fragment="products" class="nav-link">{{ lang.t.navArrangements }}</a></li>
      <li><a [routerLink]="['/']" fragment="products" class="nav-link">{{ lang.t.navOccasions }}</a></li>
      <li><a routerLink="/events" class="nav-link">{{ lang.t.navEvents }}</a></li>
    </ul>

    <!-- Logo component -->
    <app-logo customClass="navbar-logo-override"></app-logo>

    <!-- Right actions -->
    <div class="nav-actions">
      <!-- PrimeNG Buttons for icons -->
      <p-button icon="pi pi-search" [text]="true" rounded="true" styleClass="p-button-plain p-button-sm flor-icon"></p-button>
      <p-button icon="pi pi-heart" [text]="true" rounded="true" styleClass="p-button-plain p-button-sm flor-icon"></p-button>
      <p-button icon="pi pi-user" [text]="true" rounded="true" styleClass="p-button-plain p-button-sm flor-icon" (onClick)="trackOrder()"></p-button>
      
      <!-- PrimeNG Button + pBadge for cart -->
      <p-button styleClass="p-button-plain p-button-sm flor-icon mr-2 p-0" [text]="true" rounded="true" aria-label="Cart" (click)="toggleCart()">
        <i class="pi pi-shopping-bag" pBadge [value]="cartService.getTotalItems() ? cartService.getTotalItems().toString() : ''" severity="danger"></i>
      </p-button>

      <!-- Language toggle -->
      <div class="lang-toggle">
        <button class="lang-btn" [class.active]="lang.current === 'vi'" (click)="setLang('vi')" id="lang-vi">VI</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" [class.active]="lang.current === 'en'" (click)="setLang('en')" id="lang-en">EN</button>
      </div>
    </div>

  </nav>

  <!-- CART SIDEBAR COMPONENT -->
  <app-cart [(visible)]="cartVisible"></app-cart>
</header>
